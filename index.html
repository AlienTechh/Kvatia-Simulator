<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0 - Hyper Edition</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
        }

        .dark-mode {
            --bg-app: #1c1c1e;
            --bg-item: #2c2c2e;
            --text-main: #ffffff;
            --border-color: #3a3a3c;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #111; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; touch-action: none;
        }
        
        .phone { 
            width: 300px; height: 620px; background: #000; 
            border: 12px solid #2c2c2e; border-radius: 54px; 
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Power Button */
        .side-button {
            position: absolute; right: -15px; top: 140px;
            width: 4px; height: 60px; background: #3a3a3c;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 5000;
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 85px; height: 25px; background: #000; border-radius: 20px; z-index: 3900; }
        
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 220px; background: rgba(255,255,255,0.15); padding: 20px; border-radius: 28px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .cc-btn { width: 220px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 20px; color: white; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4500; transition: opacity 0.3s; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; }
        .lock-time { font-size: 64px; font-weight: 200; }

        /* HyperOS 2 Unlock Animation */
        .drag-btn { 
            position: absolute; width: 56px; height: 56px; border-radius: 14px; 
            display: none; justify-content: center; align-items: center; 
            font-size: 28px; cursor: grab; z-index: 5; 
            opacity: 0; transform: translateY(100px) scale(0.5); 
        }
        
        .is-unlocked .drag-btn { 
            display: flex; 
            animation: hyperUnlock 0.7s var(--ios-spring) forwards;
        }

        @keyframes hyperUnlock {
            0% { opacity: 0; transform: translateY(60px) scale(0.7); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-normal-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-normal-cc { background: linear-gradient(180deg, #007aff 0%, #004080 100%); color: #fff; }
        .icon-normal-msg { background: linear-gradient(180deg, #34c759 0%, #248a3d 100%); color: #fff; }
        .icon-normal-store { background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%); color: #000; font-size: 24px; }
        .icon-normal-flappy { background: linear-gradient(180deg, #ffd700 0%, #ff8c00 100%); color: #fff; }

        #settingsBtn { top: 110px; left: 30px; animation-delay: 0.1s !important; }
        #ccIconBtn { top: 110px; left: 110px; animation-delay: 0.15s !important; }
        #msgBtn { top: 110px; left: 190px; animation-delay: 0.2s !important; }
        #storeBtn { top: 190px; left: 30px; animation-delay: 0.25s !important; }

        .multitasking-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 80; display: none; background: rgba(0,0,0,0.1); }
        .recents-view .multitasking-overlay { display: block; }
        .recents-view .app.is-running { display: flex !important; opacity: 1 !important; left: 50% !important; top: 45% !important; transform: translate(-50%, -50%) scale(0.65) !important; pointer-events: none !important; box-shadow: 0 30px 60px rgba(0,0,0,0.5); z-index: 105; }
        
        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }
        .header { padding: 50px 20px 15px; font-weight: 700; font-size: 32px; color: var(--text-main); }
        .item { padding: 14px 20px; font-size: 17px; border-bottom: 0.5px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; background: var(--bg-item); align-items: center; }

        .home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 4000; cursor: pointer; }

        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        .open .app.is-active { transform: scale(1) !important; opacity: 1 !important; pointer-events: auto !important; z-index: 1000; left: 0 !important; top: 0 !important; }

        /* Flappy Game Engine Styles */
        #game-canvas { background: #71c5cf; width: 100%; height: 100%; display: block; }
        .game-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; text-shadow: 2px 2px #000; }
    </style>
</head>
<body id="mainBody">

    <div class="side-button" onclick="togglePower()"></div>

    <div class="phone" id="phone">
        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>
        <div class="multitasking-overlay" onclick="exitRecentsToHome()"></div>

        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div onclick="toggleCC(true)">100% 🔋</div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%;">
            </div>
            <div class="cc-btn" onclick="toggleDarkMode()">Appearance</div>
            <div class="cc-btn" onclick="toggleCC(false)">Done</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div style="margin-top: 10px; opacity: 0.8;">Hold Home Bar to Unlock</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')">⚙️</div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onmousedown="setupDrag(event, this, 'cc')">🛠️</div>
        <div class="drag-btn icon-normal-msg" id="msgBtn" onmousedown="setupDrag(event, this, 'messages')">💬</div>
        <div class="drag-btn icon-normal-store" id="storeBtn" onmousedown="setupDrag(event, this, 'store')">▶️</div>

        <div class="app" id="settingsApp">
            <div class="header">Settings</div>
            <div class="item">FakeOS 1.0 <span>Hyper Edition</span></div>
            <div class="item" onclick="toggleDarkMode()">Toggle Dark Mode</div>
        </div>

        <div class="app" id="messagesApp">
            <div class="header">Messages</div>
            <div class="item">Mom: Dinner's ready!</div>
        </div>

        <div class="app" id="storeApp">
            <div class="header">Play Store</div>
            <div class="item" id="installRow">
                <div style="display:flex; align-items:center; gap:10px;">🐦 <b>Flappy Bird</b></div>
                <button onclick="installGame()" id="installBtn" style="padding:5px 15px; border-radius:15px; border:none; background:var(--ios-blue); color:white;">Install</button>
            </div>
        </div>

        <div class="app" id="flappyApp">
            <canvas id="game-canvas"></canvas>
            <div id="game-ui" class="game-overlay">
                <h1 id="game-score">0</h1>
                <p id="game-hint">Tap to Start</p>
            </div>
        </div>

        <div class="home-bar" id="bottomBar" onmousedown="handleHomeStart()" onmouseup="handleHomeEnd()"></div>
    </div>

    <script>
        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay');
        let isPowerOn = true, currentApp = null, homeTimer;
        let isFlappyInstalled = false;

        function togglePower() {
            if (isPowerOn) {
                blackOverlay.classList.add('screen-is-off');
                phone.classList.remove('is-unlocked', 'recents-view', 'open', 'cc-open');
                isPowerOn = false;
            } else {
                blackOverlay.classList.remove('screen-is-off');
                isPowerOn = true;
            }
        }

        function handleHomeStart() {
            if (isPowerOn && phone.classList.contains('is-unlocked')) {
                homeTimer = setTimeout(() => phone.classList.add('recents-view'), 600);
            }
        }

        function handleHomeEnd() {
            clearTimeout(homeTimer);
            if (phone.classList.contains('recents-view')) return;
            if (isPowerOn && !phone.classList.contains('is-unlocked')) {
                phone.classList.add('is-unlocked');
            } else if (phone.classList.contains('open')) {
                phone.classList.remove('open');
                document.querySelectorAll('.app').forEach(a => a.classList.remove('is-active'));
            }
        }

        function openApp(appEl) {
            currentApp = appEl;
            appEl.classList.add('is-running', 'is-active');
            phone.classList.add('open');
            if(appEl.id === 'flappyApp') initGame();
        }

        function installGame() {
            const btn = document.getElementById('installBtn');
            btn.innerText = "Installing...";
            setTimeout(() => {
                btn.innerText = "Open";
                btn.onclick = () => openApp(document.getElementById('flappyApp'));
                isFlappyInstalled = true;
                const icon = document.createElement('div');
                icon.className = 'drag-btn icon-normal-flappy';
                icon.id = 'flappyBtn'; icon.innerHTML = '🐦';
                icon.style.top = '190px'; icon.style.left = '110px';
                icon.onmousedown = (e) => setupDrag(e, icon, 'flappy');
                phone.appendChild(icon);
            }, 2000);
        }

        function setupDrag(e, el, type) {
            let moved = false;
            const startX = e.clientX, startY = e.clientY;
            const initX = el.offsetLeft, initY = el.offsetTop;

            const move = (ev) => {
                moved = true;
                el.style.left = (initX + (ev.clientX - startX)) + 'px';
                el.style.top = (initY + (ev.clientY - startY)) + 'px';
            };
            const stop = () => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', stop);
                if (!moved) {
                    if(type === 'settings') openApp(document.getElementById('settingsApp'));
                    else if(type === 'messages') openApp(document.getElementById('messagesApp'));
                    else if(type === 'store') openApp(document.getElementById('storeApp'));
                    else if(type === 'flappy') openApp(document.getElementById('flappyApp'));
                }
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', stop);
        }

        // --- FLAPPY BIRD GAME ENGINE ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let birdY, velocity, pipes, score, gameRunning = false;

        function initGame() {
            canvas.width = 276; canvas.height = 580;
            birdY = 250; velocity = 0; pipes = []; score = 0;
            gameRunning = false;
            document.getElementById('game-score').innerText = "0";
            document.getElementById('game-hint').style.display = "block";
            draw();
        }

        function draw() {
            ctx.fillStyle = "#71c5cf"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "yellow"; ctx.fillRect(50, birdY, 30, 24); // Bird
            ctx.fillStyle = "#2ecc71";
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, 50, p.top);
                ctx.fillRect(p.x, p.top + 150, 50, canvas.height);
            });
            if (gameRunning) update();
            if (currentApp?.id === 'flappyApp') requestAnimationFrame(draw);
        }

        function update() {
            velocity += 0.4; birdY += velocity;
            pipes.forEach(p => {
                p.x -= 2;
                if (p.x < 50 + 30 && p.x + 50 > 50 && (birdY < p.top || birdY + 24 > p.top + 150)) gameRunning = false;
                if (p.x === 0) { score++; document.getElementById('game-score').innerText = score; }
            });
            if (pipes.length === 0 || pipes[pipes.length - 1].x < 120) {
                pipes.push({ x: canvas.width, top: Math.random() * 250 + 50 });
            }
            if (birdY > canvas.height || birdY < 0) gameRunning = false;
            if (!gameRunning) document.getElementById('game-hint').innerText = "Game Over! Tap to Restart";
        }

        canvas.onclick = () => {
            if (!gameRunning) { birdY = 250; velocity = 0; pipes = []; score = 0; gameRunning = true; document.getElementById('game-hint').style.display = "none"; }
            else { velocity = -7; }
        };

        function updateTime() { 
            const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('clock').innerText = t; document.getElementById('st-time').innerText = t; 
        }
        setInterval(updateTime, 1000); updateTime();
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
    </script>
</body>
</html>
