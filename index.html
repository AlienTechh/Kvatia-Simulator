<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        /* 1. NATIVE RESET */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* 2. THE HARDWARE */
        .phone-wrapper {
            position: relative;
            padding-right: 10px;
        }

        .phone {
            width: 320px;
            height: 650px;
            background: #000;
            border-radius: 45px;
            /* Thin dark border for "On" state */
            border: 6px solid #1a1a1a; 
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s ease;
        }

        /* FULL HIDE: Border becomes pure black like the body */
        .phone.power-off {
            border-color: #000;
        }

        .phone.power-off .screen-content {
            opacity: 0;
            pointer-events: none;
        }

        .power-btn {
            position: absolute;
            right: 0;
            top: 140px;
            width: 4px;
            height: 50px;
            background: #222;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 1000;
        }

        /* 3. SCREEN & LOCKSCREEN */
        .screen-content {
            width: 100%;
            height: 100%;
            transition: opacity 0.2s ease;
            position: relative;
        }

        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070') center/cover;
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
        }

        #lockscreen.unlocked {
            transform: scale(1.5);
            opacity: 0;
            pointer-events: none;
        }

        /* 4. HOME SCREEN */
        .home-grid {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964') center/cover;
            padding: 60px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
        }

        /* 5. TOP-LEFT ZOOM ANIMATION */
        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 400;
            border-radius: 40px;
            opacity: 0;
            pointer-events: none;
            
            /* Zoom starts from top-left (where the icon is) */
            transform-origin: 15% 15%; 
            transform: scale(0);
            
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), 
                        opacity 0.2s, 
                        border-radius 0.5s;
        }

        .app-window.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            border-radius: 39px; /* Matches phone curve when open */
        }

        /* 6. UI ELEMENTS */
        .status-bar {
            position: absolute;
            top: 15px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: white;
            z-index: 600;
        }

        .home-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
            z-index: 700;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>

        <div class="phone" id="device">
            <div class="screen-content">
                <div class="status-bar">
                    <span id="clock">05:14</span>
                    <span>5G 🔋</span>
                </div>

                <div id="lockscreen" onclick="unlock()">
                    <div style="text-align: center; color: white;">
                        <h1 style="font-size: 55px; font-weight: 200; margin:0;" id="lock-clock">05:14</h1>
                        <p style="opacity: 0.8; margin:0;">Thursday, Apr 16</p>
                    </div>
                </div>

                <div class="home-grid">
                    <div class="app-icon" onclick="openApp('settings')">⚙️</div>
                </div>

                <div id="settings" class="app-window"></div>

                <div class="home-bar" onclick="goHome()"></div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = true;

        function togglePower() {
            const device = document.getElementById('device');
            const lock = document.getElementById('lockscreen');
            
            if (isPowerOn) {
                device.classList.add('power-off');
                isPowerOn = false;
            } else {
                device.classList.remove('power-off');
                lock.classList.remove('unlocked'); 
                goHome(); 
                isPowerOn = true;
            }
        }

        function unlock() {
            document.getElementById('lockscreen').classList.add('unlocked');
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
        }

        function goHome() {
            document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open'));
        }

        // Live Clock logic
        function updateTime() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const time = h + ":" + m;
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
