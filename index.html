<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0 - Power Edition</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
        }

        .dark-mode {
            --bg-app: #1c1c1e;
            --bg-item: #2c2c2e;
            --text-main: #ffffff;
            --border-color: #3a3a3c;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #111; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        
        .phone-container { position: relative; }

        /* Physical Red Power Button */
        .power-btn {
            position: absolute; 
            right: -14px; 
            top: 140px; 
            width: 5px; 
            height: 45px;
            background: #ff3b30; /* Red color as requested */
            border-radius: 0 5px 5px 0; 
            cursor: pointer; 
            z-index: 5000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .power-btn:active { transform: translateX(-2px); }

        .phone { 
            width: 290px; height: 600px; background: #000; 
            border: 10px solid #2c2c2e; border-radius: 54px; 
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; height: 22px; background: #000; border-radius: 20px; z-index: 3900; border: 1px solid #1a1a1a; }
        
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4500; transition: opacity 0.2s; pointer-events: none; opacity: 1; }
        .screen-is-on { opacity: 0; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        
        /* HyperOS 2 Unlock Animation Styles */
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s; }
        .lock-time { font-size: 64px; font-weight: 200; }

        .is-unlocked .lockscreen { transform: scale(1.3); opacity: 0; pointer-events: none; }
        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .drag-btn { opacity: 1; transform: scale(1) translateY(0); }

        /* App Icons */
        .drag-btn { position: absolute; width: 56px; height: 56px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.8) translateY(30px); transition: opacity 0.5s, transform 0.7s var(--ios-spring); }
        .icon-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-playstore { background: white; color: #4285F4; font-size: 22px; font-weight: bold; }
        .icon-flappy { background: #54C0C9; display: none; }
        
        .uninstall-btn { position: absolute; top: -10px; right: -10px; width: 22px; height: 22px; background: #ff3b30; color: white; border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; border: 2px solid white; }

        #settingsBtn { top: 100px; left: 30px; }
        #playstoreBtn { top: 100px; left: 110px; }
        #flappyIcon { top: 100px; left: 190px; }

        /* App Containers */
        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 4000; transform: scale(0.9); opacity: 0; pointer-events: none; transition: transform 0.4s var(--ios-spring), opacity 0.3s; border-radius: 44px; display: flex; flex-direction: column; }
        .open .app { transform: scale(1); opacity: 1; pointer-events: auto; }
        .header { padding: 50px 20px 15px; font-weight: 700; font-size: 28px; color: var(--text-main); }

        /* Play Store UI */
        .store-item { margin: 20px; padding: 15px; background: var(--bg-item); border-radius: 15px; display: flex; align-items: center; gap: 15px; }
        .install-btn { margin-left: auto; background: #01875f; color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; }

        /* Flappy Game */
        #flappyGame { flex: 1; background: #70c5ce; position: relative; overflow: hidden; }
        #bird { position: absolute; left: 40px; top: 200px; font-size: 24px; }
        
        .home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 4600; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        
        <div class="phone" id="phone">
            <audio id="sound-unlock" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
            
            <div class="screen-off" id="blackOverlay"></div>
            <div class="brightness-overlay"></div>
            <div class="punch-hole"></div>
            <div class="wallpaper"></div>
            
            <div class="status-bar">
                <span id="st-time">12:00</span>
                <span>100%</span>
            </div>

            <div class="lockscreen" id="lockView">
                <div class="lock-time" id="clock">12:00</div>
                <div style="margin-top: 100px; font-size: 40px;" onclick="unlockPhone()">👆</div>
                <p style="opacity: 0.7;">Tap to Unlock</p>
            </div>

            <div class="drag-btn icon-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')">⚙️</div>
            <div class="drag-btn icon-playstore" id="playstoreBtn" onmousedown="setupDrag(event, this, 'store')" ontouchstart="setupDrag(event, this, 'store')">▶️</div>
            <div class="drag-btn icon-flappy" id="flappyIcon" onmousedown="setupDrag(event, this, 'flappy')" ontouchstart="setupDrag(event, this, 'flappy')">
                🐦
                <div class="uninstall-btn" id="uninstallBtn" onclick="uninstallGame(event)">✕</div>
            </div>

            <div class="app" id="playstoreApp">
                <div class="header">Play Store</div>
                <div class="store-item">
                    <div style="font-size: 30px;">🐦</div>
                    <div>
                        <div style="font-weight: bold;">Flappy Bird</div>
                        <div style="font-size: 12px; opacity: 0.5;">Retro Games Inc.</div>
                    </div>
                    <div class="install-btn" id="installBtn" onclick="startInstall()">Install</div>
                </div>
            </div>

            <div class="app" id="flappyApp" onclick="birdJump()">
                <div id="flappyGame">
                    <div id="bird">🐦</div>
                    <div id="score" style="position: absolute; width:100%; text-align:center; top:20px; font-size:30px; color:white; font-weight:bold;">0</div>
                </div>
            </div>

            <div class="home-bar" onclick="goHome()"></div>
        </div>
    </div>

    <script>
        let isPowerOn = false, gameInstalled = false, birdY = 200, velocity = 0, isJumping = false;

        function togglePower() {
            isPowerOn = !isPowerOn;
            const overlay = document.getElementById('blackOverlay');
            if (isPowerOn) {
                overlay.classList.add('screen-is-on');
            } else {
                overlay.classList.remove('screen-is-on');
                document.getElementById('phone').classList.remove('is-unlocked', 'open');
            }
        }

        function unlockPhone() {
            document.getElementById('sound-unlock').play().catch(()=>{});
            document.getElementById('phone').classList.add('is-unlocked');
        }

        function goHome() {
            document.getElementById('phone').classList.remove('open');
            isJumping = false;
        }

        function startInstall() {
            const btn = document.getElementById('installBtn');
            btn.innerText = "Installing...";
            btn.style.background = "#555";
            setTimeout(() => {
                gameInstalled = true;
                document.getElementById('flappyIcon').style.display = 'flex';
                btn.innerText = "Open";
                btn.style.background = "#01875f";
            }, 5000);
        }

        function uninstallGame(e) {
            e.stopPropagation();
            gameInstalled = false;
            document.getElementById('flappyIcon').style.display = 'none';
            document.getElementById('installBtn').innerText = "Install";
        }

        function setupDrag(e, el, type) {
            let moved = false;
            let timer = setTimeout(() => { if(!moved && type === 'flappy') document.getElementById('uninstallBtn').style.display = 'flex'; }, 1000);
            
            const isTouch = e.type === 'touchstart';
            const startX = isTouch ? e.touches[0].clientX : e.clientX;
            const startY = isTouch ? e.touches[0].clientY : e.clientY;
            const initX = el.offsetLeft, initY = el.offsetTop;

            const move = (ev) => {
                moved = true;
                const curX = isTouch ? ev.touches[0].clientX : ev.clientX;
                const curY = isTouch ? ev.touches[0].clientY : ev.clientY;
                el.style.left = (initX + (curX - startX)) + 'px';
                el.style.top = (initY + (curY - startY)) + 'px';
            };

            const stop = () => {
                clearTimeout(timer);
                document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', move);
                document.removeEventListener(isTouch ? 'touchend' : 'mouseup', stop);
                if (!moved) {
                    document.getElementById('uninstallBtn').style.display = 'none';
                    openApp(type);
                }
            };
            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', move);
            document.addEventListener(isTouch ? 'touchend' : 'mouseup', stop);
        }

        function openApp(type) {
            document.getElementById('phone').classList.add('open');
            document.querySelectorAll('.app').forEach(a => a.style.display = 'none');
            if(type === 'store') document.getElementById('playstoreApp').style.display = 'flex';
            if(type === 'flappy') {
                document.getElementById('flappyApp').style.display = 'flex';
                initGame();
            }
        }

        // Simple Flappy Logic
        function birdJump() { velocity = -6; }
        function initGame() {
            isJumping = true; birdY = 200; velocity = 0;
            function loop() {
                if(!isJumping) return;
                velocity += 0.4;
                birdY += velocity;
                document.getElementById('bird').style.top = birdY + "px";
                if(birdY < 550 && birdY > 0) requestAnimationFrame(loop);
                else { birdY = 200; velocity = 0; requestAnimationFrame(loop); }
            }
            loop();
        }

        function updateTime() {
            const n = new Date();
            const t = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
            document.getElementById('clock').innerText = t;
            document.getElementById('st-time').innerText = t;
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
