<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -16px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 12px; height: 12px; background: #1a1a1a;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 50;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 43px; overflow: hidden;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            align-items: center; color: white;
            border-radius: 43px;
        }

        /* Home Screen */
        #homescreen {
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            padding-top: 60px;
        }

        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; padding: 20px;
        }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; background: linear-gradient(#444, #222);
            cursor: pointer;
        }

        /* Settings App - Fixed Slower Zoom */
        #settings-app {
            display: flex; /* Always flex but hidden via opacity/scale */
            background: #1c1c1e;
            z-index: 40;
            /* Slower, smoother 0.8s timing */
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        opacity 0.6s ease, 
                        visibility 0.8s;
            transform: scale(0);
            opacity: 0;
            visibility: hidden; 
            pointer-events: none;
            transform-origin: 50px 100px; 
        }

        #settings-app.open {
            transform: scale(1);
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .settings-header {
            width: 100%; padding: 50px 20px 20px;
            font-size: 24px; font-weight: bold; border-bottom: 1px solid #2c2c2e;
            box-sizing: border-box;
        }

        /* Home Bar */
        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 8px;
            left: 50%; transform: translateX(-50%); z-index: 60;
            cursor: pointer; display: none;
        }

        #lockscreen { padding-top: 80px; }
        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen" id="main-screen">
            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
                <p style="font-size: 12px; color: #555; position: absolute; bottom: 50px;">Tap bar to unlock</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-container" onclick="openSettings()">
                        <div class="app-icon">⚙️</div>
                        <p style="font-size: 10px; text-align: center;">Settings</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-header">Settings</div>
                <div style="padding: 20px; color: #888;">
                    <p>Animation Speed: Slow</p>
                    <p>System: Stable</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;

        function togglePower() {
            const views = ['lockscreen', 'homescreen', 'home-bar'];
            const settings = document.getElementById('settings-app');
            
            isPowerOn = !isPowerOn;
            isUnlocked = false;

            settings.classList.remove('open'); // Close app on power off
            
            views.forEach(id => {
                document.getElementById(id).style.display = isPowerOn ? (id === 'home-bar' ? 'block' : (id === 'lockscreen' ? 'flex' : 'none')) : 'none';
            });
            
            if (isPowerOn) {
                document.getElementById('homescreen').style.display = 'none';
                updateClock();
            }
        }

        function handleHomeBar() {
            if (!isPowerOn) return;
            
            const settings = document.getElementById('settings-app');
            if (settings.classList.contains('open')) {
                // Smoothly close the app
                settings.classList.remove('open');
            } else if (!isUnlocked) {
                // Unlock phone
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
            }
        }

        function openSettings() {
            document.getElementById('settings-app').classList.add('open');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
