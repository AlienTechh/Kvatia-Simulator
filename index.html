<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Pro - Final Refinement</title>
    <style>
        :root {
            --phone-width: 310px;
            --phone-height: 640px;
            --phone-radius: 54px; /* Outer frame */
            --inner-radius: 44px; /* Inner screen/app radius */
            --icon-radius: 14px;
            --fluid-bezier: cubic-bezier(0.3, 0.8, 0.1, 1);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            background: #0d0d0d; display: flex;
            justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* Power Button - Always Visible */
        .power-btn {
            position: absolute; right: -15px; top: 130px;
            width: 5px; height: 55px; background: #333;
            border-radius: 0 4px 4px 0; cursor: pointer; z-index: 200;
        }

        /* Phone Frame - Always Visible */
        #phone-shell {
            width: var(--phone-width); height: var(--phone-height);
            background: #111; border: 10px solid #222;
            border-radius: var(--phone-radius); position: relative;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8);
            overflow: hidden; isolation: isolate;
        }

        /* The actual "Display" content that turns off */
        #display-content {
            width: 100%; height: 100%;
            position: relative;
            transition: opacity 0.3s ease;
        }

        .screen-off { opacity: 0 !important; pointer-events: none; }

        .punch-hole {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 14px; background: #000;
            border-radius: 50%; z-index: 100;
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: transform 0.6s var(--fluid-bezier);
        }

        #lockscreen {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=600');
            z-index: 50; display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white;
        }

        #homescreen {
            background-image: url('https://images.unsplash.com/photo-1635776062127-d379bfcba9f8?auto=format&fit=crop&q=80&w=600');
            z-index: 40; padding: 60px 20px; box-sizing: border-box;
        }

        /* App Layout */
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .dock {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            height: 70px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); border-radius: 24px;
            display: flex; justify-content: space-evenly; align-items: center;
        }

        .app-wrapper { display: flex; flex-direction: column; align-items: center; }
        .app-icon {
            width: 54px; height: 54px; border-radius: var(--icon-radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: transform 0.1s;
        }
        .app-icon:active { transform: scale(0.85); }
        .app-label { color: white; font-size: 10px; margin-top: 5px; }

        /* App Window - Sync Radius with Phone Frame */
        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; transform: scale(0); opacity: 0;
            border-radius: 100px; /* Start round */
            pointer-events: none;
            transition: 
                transform 0.5s var(--fluid-bezier), 
                opacity 0.2s, 
                border-radius 0.5s var(--fluid-bezier);
            overflow: hidden; background: #fff;
        }

        #app-window.open { 
            transform: scale(1); 
            opacity: 1; 
            border-radius: var(--inner-radius); /* Matches phone corner */
            pointer-events: auto; 
        }

        /* Swipe Bar */
        .nav-trigger {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
            z-index: 150; display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 8px; cursor: grab;
        }
        .nav-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 10px; }
        .dark-bar { background: rgba(0,0,0,0.3); }
        .hidden_ls { transform: translateY(-100%); pointer-events: none; }
    </style>
</head>
<body>

    <div style="position: relative;">
        <div class="power-btn" id="pwr-btn"></div>
        
        <div id="phone-shell">
            <div id="display-content">
                <div class="punch-hole"></div>
                
                <div id="lockscreen" class="layer">
                    <h1 style="font-size: 3.5rem; margin: 0; font-weight: 200;">09:41</h1>
                </div>

                <div id="homescreen" class="layer">
                    <div class="app-grid">
                        <div class="app-wrapper">
                            <div class="app-icon" data-name="Settings" style="background:#eee;">⚙️</div>
                            <span class="app-label">Settings</span>
                        </div>
                    </div>

                    <div class="dock">
                        <div class="app-icon" data-name="Phone" style="background:#2ecc71;">📞</div>
                        <div class="app-icon" data-name="Chat" style="background:#3498db;">💬</div>
                        <div class="app-icon" data-name="Music" style="background:#e67e22;">🎵</div>
                        <div class="app-icon" data-name="Camera" style="background:#95a5a6;">📷</div>
                    </div>
                </div>

                <div id="app-window">
                    <div id="app-content" style="padding: 60px 30px; color: #000;">
                        <h2 id="app-title">App</h2>
                        <p>Fluid Animation System</p>
                    </div>
                </div>

                <div class="nav-trigger" id="nav-trigger">
                    <div class="nav-bar" id="visual-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display-content');
        const lockscreen = document.getElementById('lockscreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        const pwrBtn = document.getElementById('pwr-btn');
        
        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;

        // --- FIXED ONE-TAP OPENING ---
        // Using global event delegation to catch all icons (Grid + Dock)
        document.addEventListener('pointerdown', (e) => {
            const icon = e.target.closest('.app-icon');
            if (!icon || !isPowerOn || !lockscreen.classList.contains('hidden_ls')) return;
            
            // Interrupt current animation
            appWindow.style.transition = 'none';
            appWindow.classList.remove('open');
            void appWindow.offsetWidth;

            const name = icon.getAttribute('data-name');
            const rect = icon.getBoundingClientRect();
            const phoneRect = document.getElementById('phone-shell').getBoundingClientRect();
            
            const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
            const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
            
            appWindow.style.transformOrigin = `${x}% ${y}%`;
            document.getElementById('app-title').innerText = name;

            requestAnimationFrame(() => {
                appWindow.style.transition = ''; 
                appWindow.classList.add('open');
            });
        });

        // --- SWIPE GESTURE ---
        const startAction = (e) => { if (!isPowerOn) return; isDragging = true; startY = e.clientY || (e.touches ? e.touches[0].clientY : 0); };
        const moveAction = (e) => {
            if (!isDragging) return;
            const currentY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const diff = startY - currentY;
            if (diff > 0) visualBar.style.transform = `translateY(-${Math.min(diff/3, 20)}px)`;
        };
        const endAction = (e) => {
            if (!isDragging) return;
            const endY = (e.clientY === undefined) ? e.changedTouches[0].clientY : e.clientY;
            if (startY - endY > 50) {
                if (!lockscreen.classList.contains('hidden_ls')) {
                    lockscreen.classList.add('hidden_ls');
                    visualBar.classList.add('dark-bar');
                } else {
                    appWindow.classList.remove('open');
                }
            }
            visualBar.style.transform = `translateY(0)`;
            isDragging = false;
        };

        trigger.addEventListener('pointerdown', startAction);
        window.addEventListener('pointermove', moveAction);
        window.addEventListener('pointerup', endAction);

        // --- POWER (Invisible Screen, Visible Phone) ---
        pwrBtn.addEventListener('click', () => {
            if (isPowerOn) {
                appWindow.classList.remove('open');
                lockscreen.classList.remove('hidden_ls');
                display.classList.add('screen-off'); // Only hide internal display
                visualBar.classList.remove('dark-bar');
                isPowerOn = false;
            } else {
                display.classList.remove('screen-off');
                isPowerOn = true;
            }
        });
    </script>
</body>
</html>
