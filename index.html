<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CleanOS 1.0 Beta</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .phone-wrapper {
            position: relative;
            padding-right: 12px;
        }

        .phone {
            width: 320px;
            height: 660px;
            background: #000; 
            border-radius: 45px;
            border: 4px solid #222; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .top-bezel {
            width: 100%;
            height: 45px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .speaker { width: 40px; height: 4px; background: #222; border-radius: 2px; }
        .sensor { width: 6px; height: 6px; background: #111; border-radius: 50%; margin-left: 10px; }
        .bottom-bezel { width: 100%; height: 45px; background: #000; z-index: 1000; }

        .power-btn {
            position: absolute;
            right: 0;
            top: 140px;
            width: 4px;
            height: 45px;
            background: #444;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 1001;
            transition: background 0.2s;
        }
        
        .power-btn:active { background: #666; }

        .screen-content {
            flex: 1;
            width: 100%;
            position: relative;
            background: #000;
            transition: opacity 0.25s ease-in-out;
        }

        .screen-off { opacity: 0 !important; pointer-events: none !important; }

        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px 20px;
            /* Transition added dynamically in JS to prevent lag during drag */
        }

        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 400;
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
            transition: transform 0.45s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.2s;
            overflow: hidden;
        }

        .app-window.open { opacity: 1; transform: scale(1); pointer-events: auto; }
        #settings { transform-origin: 15% 15%; background: #f2f2f7; padding: 40px 20px; }
        #tiktok { transform-origin: 40% 15%; background: #000; }

        .tiktok-feed { width: 100%; height: 100%; position: relative; background-color: #000; }
        .tiktok-image { width: 100%; height: 100%; object-fit: cover; display: block; }

        .sidebar {
            position: absolute; right: 10px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 500;
        }

        .action-btn {
            width: 35px; height: 35px; cursor: pointer; display: flex;
            justify-content: center; align-items: center; font-size: 24px;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.8));
        }

        .heart-icon { color: white; }
        .heart-icon.active { color: #ff2d55; }
        .fav-icon { color: white; }
        .fav-icon.active { color: #ffcc00; }
        .comment-icon { color: white; }

        .home-grid {
            width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            padding: 30px 25px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
        }

        .app-icon {
            width: 54px; height: 54px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
        }

        .status-bar {
            position: absolute; top: 5px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: 600; color: white; z-index: 600;
        }

        /* Unified gesture trigger area */
        .gesture-trigger {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 15px; z-index: 900; cursor: grab;
        }

        .home-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.8); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="phone">
            <div class="top-bezel"><div class="sensor"></div><div class="speaker"></div><div class="sensor"></div></div>

            <div class="screen-content" id="screen">
                <div class="status-bar">
                    <span id="clock">09:41</span>
                    <span>5G 🔋</span> 
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white; margin-top: 40px;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p style="opacity: 0.8; margin:0;">Thursday, Apr 16</p>
                    </div>
                </div>

                <div class="home-grid">
                    <div class="app-icon" onpointerdown="openApp('settings')">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png&color=000000" width="100%">
                    </div>
                    <div class="app-icon" onpointerdown="openApp('tiktok')">
                        <img src="https://img.icons8.com/?size=100&id=118638&format=png&color=000000" width="100%">
                    </div>
                </div>

                <div id="settings" class="app-window">
                    <h2 style="margin: 20px;">Settings</h2>
                    <p style="margin: 20px;">CleanOS v1.0 Beta</p>
                </div>

                <div id="tiktok" class="app-window">
                    <div class="tiktok-feed">
                        <img class="tiktok-image" src="https://photo-cdn2.icons8.com/u6Kq-Mztr6T6ndoFGgWU8u9KCkCVpR5PrUAwGE4VhoQ/rs:fit:1606:1072/wm:1:re:0:0:0.65/wmid:moose/q:98/czM6Ly9pY29uczgu/bW9vc2UtcHJvZC5h/c3NldHMvYXNzZXRz/L3NhdGEvb3JpZ2lu/YWwvNjA1L2Q2MmFi/YTFmLWVhNzEtNDlk/ZC04MDRhLTU2OTVh/MzA4M2IyYi5qcGc.jpg">
                        <div class="sidebar">
                            <div class="action-btn heart-icon" onclick="toggleLike(this)">❤</div>
                            <div class="action-btn comment-icon">🗨</div>
                            <div class="action-btn fav-icon" onclick="toggleFav(this)">★</div>
                        </div>
                    </div>
                </div>

                <div class="gesture-trigger" id="gesture-area">
                    <div class="home-bar"></div>
                </div>
            </div>

            <div class="bottom-bezel"></div>
        </div>
    </div>

    <script>
        let isPowerOn = true;
        let isUnlocked = false;
        let startY = 0;
        let isDragging = false;

        const screen = document.getElementById('screen');
        const lockscreen = document.getElementById('lockscreen');
        const gestureArea = document.getElementById('gesture-area');

        function toggleLike(el) { el.classList.toggle('active'); }
        function toggleFav(el) { el.classList.toggle('active'); }

        // Gesture Logic
        const handleStart = (e) => {
            if (!isPowerOn) return;
            isDragging = true;
            startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            // Remove transitions for smooth tracking
            lockscreen.style.transition = 'none';
            const openApp = document.querySelector('.app-window.open');
            if (openApp) openApp.style.transition = 'none';
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const currentY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const deltaY = currentY - startY;

            if (deltaY < 0) { // Only allow sliding up
                if (!isUnlocked) {
                    lockscreen.style.transform = `translateY(${deltaY}px)`;
                } else {
                    const openApp = document.querySelector('.app-window.open');
                    if (openApp) {
                        // App scales down slightly as you pull up
                        const scale = 1 - Math.abs(deltaY / 2000);
                        openApp.style.transform = `translateY(${deltaY}px) scale(${scale})`;
                    }
                }
            }
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            isDragging = false;
            const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : startY);
            const totalTravel = startY - endY;

            // Re-enable transitions for snapping
            lockscreen.style.transition = 'transform 0.5s cubic-bezier(0.19, 1, 0.22, 1)';
            const openApp = document.querySelector('.app-window.open');
            if (openApp) openApp.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.2s';

            if (totalTravel > 120) { 
                // Threshold met: Unlock or Go Home
                if (!isUnlocked) {
                    lockscreen.style.transform = 'translateY(-100%)';
                    isUnlocked = true;
                } else {
                    goHome();
                }
            } else {
                // Not enough slide: Snap back
                if (!isUnlocked) {
                    lockscreen.style.transform = 'translateY(0)';
                } else if (openApp) {
                    openApp.style.transform = 'translateY(0) scale(1)';
                }
            }
        };

        gestureArea.addEventListener('pointerdown', handleStart);
        window.addEventListener('pointermove', handleMove);
        window.addEventListener('pointerup', handleEnd);

        function unlock() { 
            lockscreen.style.transform = 'translateY(-100%)'; 
            isUnlocked = true;
        }

        function goHome() { 
            document.querySelectorAll('.app-window').forEach(w => {
                w.classList.remove('open');
                w.style.transform = 'scale(0)'; // Reset for next open
            });
        }

        function openApp(id) { 
            const app = document.getElementById(id);
            app.classList.add('open');
            app.style.transform = 'scale(1)';
        }

        function togglePower() {
            isPowerOn = !isPowerOn;
            if (isPowerOn) {
                screen.classList.remove('screen-off');
                isUnlocked = false;
                lockscreen.style.transform = 'translateY(0)';
                goHome();
            } else {
                screen.classList.add('screen-off');
            }
        }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
