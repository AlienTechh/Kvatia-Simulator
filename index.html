<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CleanOS 1.0 Beta - Ultimate S8 Edition</title>
    <style>
        :root {
            --accent-color: #007aff;
            --bg-color: #000;
            --card-bg: rgba(255,255,255,0.1);
            --text-color: #fff;
            --blur-intensity: 25px;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none; 
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            transition: filter 0.5s ease;
        }

        /* --- GLOBAL VISUAL MODES --- */
        body.amoled-black .phone, body.amoled-black .screen-content { background: #000 !important; }
        body.comic-sans * { font-family: "Comic Sans MS", cursive !important; }
        body.wireframe * { background: transparent !important; border: 1px solid var(--accent-color) !important; color: var(--accent-color) !important; box-shadow: none !important; }
        
        /* CRT EFFECT */
        #crt-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 5000; opacity: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }
        body.crt-mode #crt-overlay { opacity: 1; }
        body.crt-mode .phone { border-radius: 60px / 15px; transform: scale(1.02) perspective(1000px) rotateX(2deg); }

        /* RGB GAMING BORDERS */
        @keyframes rgb-pulse { 0% { border-color: red; } 33% { border-color: lime; } 66% { border-color: blue; } 100% { border-color: red; } }
        body.rgb-mode .phone { animation: rgb-pulse 2s infinite linear; border-width: 4px; }

        /* E-INK MODE */
        body.eink-mode .phone { filter: grayscale(1) contrast(1.1); }
        #eink-texture { position: absolute; inset: 0; pointer-events: none; z-index: 4999; opacity: 0; background: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); mix-blend-mode: multiply; }
        body.eink-mode #eink-texture { opacity: 0.4; }

        /* WINDOWS 95 VIBE */
        body.win95 .cc-tile, body.win95 .app-icon { border: 2px solid; border-color: #fff #808080 #808080 #fff; background: #c0c0c0 !important; border-radius: 0 !important; color: #000 !important; }

        /* --- PHONE STRUCTURE --- */
        .phone-wrapper { position: relative; padding-right: 12px; }
        .phone {
            width: 320px; height: 680px; background: #000; border-radius: 48px; border: 2px solid #222; 
            position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; transition: all 0.5s ease;
        }

        .screen-content {
            flex: 1; width: 100%; position: relative; background: #000;
            overflow: hidden; border-radius: 40px;
        }

        /* MATRIX BG */
        #matrix-canvas { position: absolute; inset: 0; z-index: 0; opacity: 0; transition: opacity 1s; }
        body.matrix-mode #matrix-canvas { opacity: 1; }

        /* --- UI COMPONENTS --- */
        .status-bar { 
            position: absolute; top: 0; width: 100%; height: 40px; padding: 10px 25px; 
            display: flex; justify-content: space-between; font-size: 11px; color: white; z-index: 1200; 
        }

        #lockscreen {
            position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 1100; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px 40px;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .fingerprint-area { width: 60px; height: 60px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); cursor: pointer; }
        .fingerprint-area:active { background: var(--accent-color); box-shadow: 0 0 20px var(--accent-color); transform: scale(0.95); }

        /* CONTROL CENTER */
        #control-center {
            position: absolute; top: 0; left: 0; right: 0; height: 100%; background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(var(--blur-intensity)); z-index: 1300; transform: translateY(-100%); 
            padding: 60px 20px; transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #control-center.open { transform: translateY(0); }
        .cc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .cc-tile { background: var(--card-bg); padding: 15px; border-radius: 18px; font-size: 12px; color: white; text-align: center; cursor: pointer; }
        .cc-tile.active { background: var(--accent-color); }

        /* HOMESCREEN */
        .home-screen {
            width: 100%; height: 100%; position: relative; padding: 60px 25px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            opacity: 0; transform: scale(0.9); transition: all 0.5s ease;
        }
        .home-screen.unlocked { opacity: 1; transform: scale(1); }

        .app-icon { width: 55px; height: 55px; border-radius: 14px; cursor: pointer; position: relative; transition: transform 0.2s; }
        .app-icon img { width: 100%; height: 100%; border-radius: 14px; }
        .app-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }

        /* APP WINDOWS & ANIMATIONS */
        .app-window { 
            position: absolute; inset: 0; background: #fff; z-index: 1000; 
            transform: scale(0); opacity: 0; border-radius: 40px; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .app-window.open { transform: scale(1); opacity: 1; }
        
        .shatter { animation: shatter-effect 0.5s forwards !important; }
        @keyframes shatter-effect {
            0% { transform: scale(1); clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
            100% { transform: scale(1.2) translateY(20px); opacity: 0; clip-path: polygon(0 20%, 30% 0, 100% 40%, 70% 100%, 0 80%); }
        }

        /* CORE APPS */
        .settings-list { background: #fff; color: #000; height: 100%; overflow-y: auto; }
        .settings-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .terminal { background: #000; color: #0f0; padding: 50px 20px; font-family: monospace; height: 100%; overflow-y: auto; }

        /* CLIPIFY */
        #clippy { position: absolute; bottom: 80px; right: 20px; width: 60px; z-index: 2000; display: none; }

        .home-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 100px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 10px; z-index: 1500; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="phone-wrapper">
        <div class="phone" id="phone-body">
            <div id="eink-texture"></div>
            <div id="crt-overlay"></div>
            <canvas id="matrix-canvas"></canvas>

            <div class="screen-content" id="screen">
                <div class="status-bar" id="status-bar">
                    <span id="clock">09:41</span>
                    <span id="battery-icon">100% 🔋</span>
                </div>

                <div id="control-center">
                    <h3 style="margin: 0 0 20px 0;">Control Center</h3>
                    <div class="cc-grid">
                        <div class="cc-tile" onclick="sysToggle('crt-mode')">CRT Mode</div>
                        <div class="cc-tile" onclick="sysToggle('rgb-mode')">RGB Borders</div>
                        <div class="cc-tile" onclick="sysToggle('matrix-mode')">Matrix</div>
                        <div class="cc-tile" onclick="sysToggle('eink-mode')">E-Ink</div>
                        <div class="cc-tile" onclick="sysToggle('win95')">Win 95</div>
                        <div class="cc-tile" onclick="sysToggle('wireframe')">Wireframe</div>
                        <div class="cc-tile" onclick="sysToggle('comic-sans')">Comic Sans</div>
                        <div class="cc-tile" onclick="sysToggle('amoled-black')">Pure Black</div>
                    </div>
                </div>

                <div id="lockscreen">
                    <div style="text-align: center; color: white;">
                        <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                        <p>Friday, April 17</p>
                    </div>
                    <div class="fingerprint-area" onclick="unlockPhone()">
                        <span style="font-size: 24px;">☝️</span>
                    </div>
                    <p style="color:white; font-size:10px; opacity:0.6;">Fingerprint Required</p>
                </div>

                <div class="home-screen" id="homescreen">
                    <div class="app-icon" onclick="openApp('settings-app')">
                        <img src="https://img.icons8.com/?size=100&id=a8NHl6SmDbn7&format=png">
                        <div class="app-badge">1</div>
                    </div>
                    <div class="app-icon" onclick="openApp('terminal-app')">
                        <img src="https://cdn-icons-png.flaticon.com/128/908/908304.png">
                    </div>
                    <div class="app-icon" onclick="sysToggle('clippy')">
                        <img src="https://cdn-icons-png.flaticon.com/128/2040/2040504.png">
                    </div>
                    <div class="app-icon" onclick="window.location.reload()">
                        <img src="https://cdn-icons-png.flaticon.com/128/1828/1828490.png">
                    </div>
                </div>

                <div id="settings-app" class="app-window">
                    <div class="settings-list">
                        <div class="settings-item" onclick="closeApp('settings-app')" style="color:var(--accent-color)">‹ Back</div>
                        <div style="padding:20px; font-weight:bold; font-size:24px;">Settings</div>
                        <div class="settings-item" onclick="alert('RAM Downloaded! OS now 0% faster.')">Download More RAM<span>🚀</span></div>
                        <div class="settings-item" onclick="sysToggle('amoled-black')">True AMOLED Black<span>⚫</span></div>
                        <div class="settings-item">Accent Color <input type="color" onchange="document.documentElement.style.setProperty('--accent-color', this.value)"></div>
                        <div class="settings-item" onclick="shutdownCRT()">Factory Reset<span>⚠️</span></div>
                    </div>
                </div>

                <div id="terminal-app" class="app-window terminal">
                    <div onclick="closeApp('terminal-app')" style="color:red; margin-bottom:10px;">[X] CLOSE</div>
                    <div>CleanOS Kernel v1.0.4 Loaded...</div>
                    <div id="term-out"></div>
                    <div style="display:flex">> <input type="text" id="term-input" style="background:transparent; border:none; color:#0f0; width:100%; outline:none;" autofocus></div>
                </div>

                <img id="clippy" src="https://upload.wikimedia.org/wikipedia/en/thumb/8/83/Clippy-letter.png/150px-Clippy-letter.png" onclick="alert('I see you are trying to use a fake OS!')">

                <div class="home-bar" onclick="goHome()"></div>
            </div>
        </div>
    </div>

    <script>
        let isUnlocked = false, isCCOpen = false, targetFPS = 60, lastFrameTime = 0;

        // --- CORE SYSTEM ENGINE ---
        function sysToggle(mode) {
            if(mode === 'clippy') {
                const c = document.getElementById('clippy');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                return;
            }
            document.body.classList.toggle(mode);
            if(mode === 'eink-mode') targetFPS = document.body.classList.contains('eink-mode') ? 5 : 60;
        }

        // --- FPS CONTROLLER ---
        const originalRAF = window.requestAnimationFrame;
        window.requestAnimationFrame = function(callback) {
            const now = performance.now(), interval = 1000 / targetFPS, delta = now - lastFrameTime;
            if (delta >= interval) {
                lastFrameTime = now - (delta % interval);
                return originalRAF(callback);
            }
            return originalRAF(() => window.requestAnimationFrame(callback));
        };

        // --- NAVIGATION ---
        function unlockPhone() {
            document.getElementById('lockscreen').style.transform = 'translateY(-100%)';
            document.getElementById('homescreen').classList.add('unlocked');
            isUnlocked = true;
        }

        function goHome() {
            document.querySelectorAll('.app-window').forEach(app => {
                if(app.classList.contains('open')) closeApp(app.id);
            });
            if(isCCOpen) {
                isCCOpen = false;
                document.getElementById('control-center').classList.remove('open');
            }
        }

        document.getElementById('status-bar').onclick = () => {
            if(!isUnlocked) return;
            isCCOpen = !isCCOpen;
            document.getElementById('control-center').classList.toggle('open', isCCOpen);
        };

        function openApp(id) {
            const app = document.getElementById(id);
            app.classList.remove('shatter');
            app.classList.add('open');
        }

        function closeApp(id) {
            const app = document.getElementById(id);
            app.classList.add('shatter');
            setTimeout(() => {
                app.classList.remove('open');
                app.classList.remove('shatter');
            }, 500);
        }

        function shutdownCRT() {
            document.getElementById('phone-body').style.animation = "shatter-effect 0.5s forwards";
            setTimeout(() => window.location.reload(), 600);
        }

        // --- MATRIX ENGINE ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320; canvas.height = 680;
        const chars = "010101 CLEANOS CLEANOS CLEANOS CleanOS CleanOS CLEANOS";
        const drops = Array(Math.floor(canvas.width/10)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "10px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*10, y*10);
                if(y*10 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // --- TERMINAL ENGINE ---
        const termInput = document.getElementById('term-input');
        termInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = termInput.value.toLowerCase();
                const out = document.getElementById('term-out');
                if(val === 'help') out.innerHTML += "> Commands: matrix, amoled, win95, clear, exit<br>";
                else if(val === 'matrix') sysToggle('matrix-mode');
                else if(val === 'amoled') sysToggle('amoled-black');
                else if(val === 'win95') sysToggle('win95');
                else if(val === 'clear') out.innerHTML = "";
                else if(val === 'exit') closeApp('terminal-app');
                else out.innerHTML += "> Error: '" + val + "' is not recognized.<br>";
                termInput.value = "";
            }
        });

        // --- CLOCK ---
        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
