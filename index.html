<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #ffffff; /* Site background set to white */
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hardware Bezels - Deep Black */
        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 14px solid #000000; /* Bezels made black */
            border-radius: 55px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -18px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        /* Punch Hole - Black and Bigger */
        .punch-hole {
            width: 18px; height: 18px; /* Bigger punch hole */
            background: #000000;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 95;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 41px; overflow: hidden;
        }

        /* Wallpaper System */
        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
            z-index: 1; background-color: #1a1a1a;
        }

        .wallpaper.app-active {
            transform: scale(1.15);
            filter: blur(15px) brightness(0.7);
        }

        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            transition: opacity 0.6s ease-in-out; opacity: 1;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 41px; z-index: 10;
        }

        #homescreen {
            padding-top: 60px;
            transform: scale(1.3); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
        }
        #homescreen.unlocked { transform: scale(1); opacity: 1; }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        /* Settings App */
        #settings-app {
            display: flex; background: rgba(0,0,0,0.7); z-index: 40;
            backdrop-filter: blur(25px); overflow: hidden;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 40px 100px;
        }
        #settings-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }

        .settings-content-wrapper { display: flex; width: 300%; height: 100%; transition: transform 0.5s ease; }
        .settings-page { width: 33.33%; height: 100%; display: flex; flex-direction: column; }
        .settings-header { padding: 50px 20px 20px; font-size: 24px; font-weight: bold; }
        .settings-item { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; cursor: pointer; }

        /* Modal */
        #wallpaper-modal {
            position: absolute; bottom: 0; width: 100%; background: #1c1c1e;
            border-radius: 25px 25px 0 0; padding: 20px; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.4s ease; z-index: 100;
        }
        #wallpaper-modal.active { transform: translateY(0); }
        .modal-btn { padding: 15px; text-align: center; border-bottom: 1px solid #333; color: #007aff; cursor: pointer; font-weight: 500;}
        .modal-btn.cancel { color: #ff3b30; border-bottom: none; }

        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; position: absolute; bottom: 10px;
            left: 50%; transform: translateX(-50%); z-index: 100;
            cursor: pointer; opacity: 0; transition: opacity 0.4s;
        }

        #lockscreen { padding-top: 80px; align-items: center; background: transparent; }
        #time { font-size: 3.8rem; font-weight: 200; text-shadow: 0 2px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen">
            <div id="lock-wp" class="wallpaper"></div>
            <div id="home-wp" class="wallpaper" style="display:none"></div>
            <div id="power-overlay"></div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
            </div>

            <div id="homescreen" class="view">
                <div style="padding: 20px;">
                    <div onclick="openSettings()" style="cursor:pointer; width: 60px;">
                        <div class="app-icon">⚙️</div>
                        <p style="font-size: 10px; text-align: center; margin-top: 5px; color: white;">Settings</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page">
                        <div class="settings-header">Settings</div>
                        <div class="settings-item" onclick="goToPage(2)">About Phone <span>></span></div>
                        <div class="settings-item" onclick="goToPage(1)">Customization <span>></span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <div style="padding: 20px;">
                            <p style="color: #bbb; font-size: 14px; margin-bottom: 15px;">Choose a wallpaper</p>
                            <button onclick="document.getElementById('wp-input').click()" style="width:100%; padding: 15px; border-radius: 12px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer;">Select Photo</button>
                            <input type="file" id="wp-input" hidden accept="image/*" onchange="handleFile(this)">
                        </div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <p style="text-align:center; font-size: 22px; margin-top: 20px; font-weight: 700;">RandomOS 1.0</p>
                        <div class="settings-item"><span style="color:#888">Phone Name</span><span>rPhone 1 Pro</span></div>
                        <div class="settings-item"><span style="color:#888">Version</span><span>Beta 1.0</span></div>
                    </div>
                </div>
            </div>

            <div id="wallpaper-modal">
                <p style="color:#888; text-align:center; font-size:13px; margin-bottom:15px;">Choose where you want to change wallpaper</p>
                <div class="modal-btn" onclick="applyWP('lock')">Lockscreen</div>
                <div class="modal-btn" onclick="applyWP('home')">Home screen</div>
                <div class="modal-btn" onclick="applyWP('both')">Both</div>
                <div class="modal-btn cancel" onclick="closeModal()">Cancel</div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false, isUnlocked = false, tempImg = "";
        const lockWP = document.getElementById('lock-wp'), homeWP = document.getElementById('home-wp');

        function togglePower() {
            isPowerOn = !isPowerOn;
            const overlay = document.getElementById('power-overlay');
            const homeBar = document.getElementById('home-bar');
            
            if (isPowerOn) {
                overlay.style.opacity = '0';
                homeBar.style.opacity = '1';
                homeBar.style.pointerEvents = 'auto';
                document.getElementById('lockscreen').style.display = 'flex';
                lockWP.style.display = 'block';
                homeWP.style.display = 'none';
                updateClock();
            } else {
                overlay.style.opacity = '1';
                homeBar.style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = 'none';
                    document.getElementById('homescreen').style.display = 'none';
                    document.getElementById('homescreen').classList.remove('unlocked');
                    document.getElementById('settings-app').classList.remove('open');
                    lockWP.classList.remove('app-active');
                    homeWP.classList.remove('app-active');
                    isUnlocked = false;
                    goToPage(0);
                }, 600);
            }
        }

        function handleHomeBar() {
            const settings = document.getElementById('settings-app');
            if (settings.classList.contains('open')) {
                settings.classList.remove('open');
                lockWP.classList.remove('app-active');
                homeWP.classList.remove('app-active');
            } else if (isPowerOn && !isUnlocked) {
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
                lockWP.style.display = 'none';
                homeWP.style.display = 'block';
                requestAnimationFrame(() => document.getElementById('homescreen').classList.add('unlocked'));
            }
        }

        function openSettings() { 
            document.getElementById('settings-app').classList.add('open');
            lockWP.classList.add('app-active');
            homeWP.classList.add('app-active');
        }

        function goToPage(num) { 
            document.getElementById('settings-nav').style.transform = `translateX(-${num * 33.33}%)`; 
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    tempImg = e.target.result; 
                    document.getElementById('wallpaper-modal').classList.add('active'); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function applyWP(type) {
            if (type === 'lock' || type === 'both') lockWP.style.backgroundImage = `url(${tempImg})`;
            if (type === 'home' || type === 'both') homeWP.style.backgroundImage = `url(${tempImg})`;
            closeModal();
        }

        function closeModal() { document.getElementById('wallpaper-modal').classList.remove('active'); }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
