<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: filter 0.5s ease;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 14px solid #000000;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -18px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 18px; height: 18px;
            background: #000000;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 95;
        }

        :root {
            --lock-bg: none;
            --home-bg: none;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 41px; overflow: hidden;
        }

        .wallpaper {
            position: absolute; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
            z-index: 1;
            background-color: #1a1a1a;
            pointer-events: none;
        }

        #lock-wp { background-image: var(--lock-bg); }
        #home-wp { background-image: var(--home-bg); }

        .wallpaper.app-active {
            transform: scale(1.15);
            filter: blur(15px) brightness(0.7);
        }

        #power-overlay {
            position: absolute; width: 100%; height: 100%;
            background: black; z-index: 90; pointer-events: none;
            transition: opacity 0.6s ease-in-out; opacity: 1;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 41px; z-index: 10;
        }

        #homescreen {
            padding-top: 60px;
            transform: scale(1.3); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
            align-content: flex-start;
        }
        #homescreen.unlocked { transform: scale(1); opacity: 1; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .app-icon-container {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        @keyframes floatChaos {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -15px) rotate(5deg); }
            50% { transform: translate(-10px, 10px) rotate(-10deg); }
            75% { transform: translate(15px, 5px) rotate(8deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .chaos-active .app-icon-container {
            animation: floatChaos 3s infinite ease-in-out;
        }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        /* Folder Icon Styling */
        .folder-preview {
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 4px; padding: 8px; box-sizing: border-box;
        }
        .mini-dot { background: white; border-radius: 3px; }

        #folder-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 150;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        #folder-window {
            width: 240px; background: rgba(255,255,255,0.2);
            border-radius: 40px; padding: 25px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            transform: scale(0.8); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #folder-window.open { transform: scale(1); opacity: 1; }

        .app-label {
            font-size: 11px; text-align: center; margin-top: 5px; color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        #settings-app {
            display: flex; background: rgba(0,0,0,0.7); z-index: 40;
            backdrop-filter: blur(25px); overflow: hidden;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 40px 100px;
        }
        #settings-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }
        .settings-content-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.5s ease; }
        .settings-page { width: 25%; height: 100%; display: flex; flex-direction: column; }
        .settings-header { padding: 50px 20px 20px; font-size: 24px; font-weight: bold; }
        .settings-item { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; cursor: pointer; align-items: center; }

        #camera-app {
            display: flex; background: #000; z-index: 50; overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
            transform: scale(0); opacity: 0; pointer-events: none;
            transform-origin: 120px 100px;
        }
        #camera-app.open { transform: scale(1); opacity: 1; pointer-events: auto; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }

        #toast {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: black; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 200;
        }

        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.5);
            border-radius: 10px; position: absolute; bottom: 10px;
            left: 50%; transform: translateX(-50%); z-index: 210;
            cursor: pointer; opacity: 0; transition: opacity 0.4s;
        }

        #time { font-size: 3.8rem; font-weight: 200; text-shadow: 0 2px 15px rgba(0,0,0,0.4); margin-top: 80px; text-align: center;}
    
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff3b30; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>
        <div id="toast">developer options activated</div>

        <div class="screen">
            <div id="lock-wp" class="wallpaper"></div>
            <div id="home-wp" class="wallpaper" style="display:none"></div>
            <div id="power-overlay"></div>

            <div id="folder-overlay" onclick="toggleFolder(false)">
                <div id="folder-window" onclick="event.stopPropagation()">
                    <div class="app-icon-container" onclick="alert('Social App 1')">
                        <div class="app-icon">💬</div>
                        <p class="app-label">Chat</p>
                    </div>
                    <div class="app-icon-container" onclick="alert('Social App 2')">
                        <div class="app-icon">📸</div>
                        <p class="app-label">Photos</p>
                    </div>
                    <div class="app-icon-container" onclick="alert('Social App 3')">
                        <div class="app-icon">🎮</div>
                        <p class="app-label">Games</p>
                    </div>
                </div>
            </div>

            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid" id="main-grid">
                    <div class="app-icon-container" onclick="openSettings()">
                        <div class="app-icon">⚙️</div>
                        <p class="app-label">Settings</p>
                    </div>

                    <div class="app-icon-container" onclick="openCamera()">
                        <div class="app-icon" style="background: rgba(200, 200, 200, 0.3);">📷</div>
                        <p class="app-label">Camera</p>
                    </div>

                    <div class="app-icon-container" onclick="toggleFolder(true)">
                        <div class="app-icon folder-preview" style="background: rgba(255,255,255,0.25);">
                            <div class="mini-dot"></div>
                            <div class="mini-dot"></div>
                            <div class="mini-dot"></div>
                            <div class="mini-dot"></div>
                        </div>
                        <p class="app-label">Social</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page">
                        <div class="settings-header">Settings</div>
                        <div class="settings-item" onclick="goToPage(1)">About Phone <span>></span></div>
                        <div class="settings-item" onclick="goToPage(2)">Customization <span>></span></div>
                        <div class="settings-item" id="dev-opt-item" style="display:none" onclick="goToPage(3)">Developer Options <span>></span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <p id="os-text" onclick="handleDevClick()" style="text-align:center; font-size: 22px; margin-top: 20px; font-weight: 700; cursor: pointer;">RandomOS 1.0</p>
                        <div class="settings-item"><span style="color:#888">Phone Name</span><span>rPhone 1 Pro</span></div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <div style="padding: 20px;">
                            <button onclick="document.getElementById('wp-input').click()" style="width:100%; padding: 15px; border-radius: 12px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer;">Select Wallpaper</button>
                            <input type="file" id="wp-input" hidden accept="image/*" onchange="handleFile(this)">
                        </div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header"><span onclick="goToPage(0)" style="color:#007aff; cursor:pointer">❮ Back</span></div>
                        <div class="settings-item">
                            <span>Chaos Mode</span>
                            <label class="switch">
                                <input type="checkbox" id="chaos-toggle" onchange="toggleChaos(this)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div id="camera-app" class="view">
                <video id="camera-feed" autoplay playsinline></video>
                <div class="camera-ui">
                    <div class="shutter-btn" onclick="takePhoto()"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false, isUnlocked = false, clickCount = 0, devActive = false, chaosInterval;
        let audioPrimed = false;
        const lockWP = document.getElementById('lock-wp'), homeWP = document.getElementById('home-wp');
        const mainGrid = document.getElementById('main-grid');

        const powerSound = new Audio('mixkit-mouse-click-close-1113.wav');
        const shutterSound = new Audio('mixkit-camera-lens-shutter-1433.wav');
        const unlockSound = new Audio('windows-8-8-1-startup-sound.mp3');

        function togglePower() {
            if (!audioPrimed) {
                [powerSound, shutterSound, unlockSound].forEach(s => {
                    s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
                });
                audioPrimed = true;
            }
            powerSound.currentTime = 0; 
            powerSound.play();
            isPowerOn = !isPowerOn;
            document.getElementById('power-overlay').style.opacity = isPowerOn ? '0' : '1';
            document.getElementById('home-bar').style.opacity = isPowerOn ? '1' : '0';
            if (isPowerOn) {
                document.getElementById('lockscreen').style.display = 'flex';
                updateClock();
            } else {
                closeAllApps();
                isUnlocked = false;
            }
        }

        function handleHomeBar() {
            const folderOverlay = document.getElementById('folder-overlay');
            if (folderOverlay.style.display === 'flex') {
                toggleFolder(false);
                return;
            }

            if (document.querySelector('.view.open') || document.getElementById('settings-app').classList.contains('open')) {
                closeAllApps();
                return;
            }

            if (isPowerOn && !isUnlocked) {
                unlockSound.currentTime = 0;
                unlockSound.play();
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
                lockWP.style.display = 'none';
                homeWP.style.display = 'block';
                setTimeout(() => document.getElementById('homescreen').classList.add('unlocked'), 10);
            }
        }

        function toggleFolder(open) {
            const overlay = document.getElementById('folder-overlay');
            const win = document.getElementById('folder-window');
            if (open) {
                overlay.style.display = 'flex';
                setTimeout(() => win.classList.add('open'), 10);
            } else {
                win.classList.remove('open');
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        }

        function closeAllApps() {
            document.querySelectorAll('.view').forEach(v => {
                if(v.id !== 'lockscreen' && v.id !== 'homescreen') {
                    v.classList.remove('open');
                }
            });
            lockWP.classList.remove('app-active');
            homeWP.classList.remove('app-active');
            if(typeof stopCamera === "function") stopCamera();
        }

        function openSettings() { 
            document.getElementById('settings-app').classList.add('open');
            lockWP.classList.add('app-active'); homeWP.classList.add('app-active');
        }

        function openCamera() {
            document.getElementById('camera-app').classList.add('open');
            lockWP.classList.add('app-active'); homeWP.classList.add('app-active');
            startCamera();
        }

        async function startCamera() {
            const video = document.getElementById('camera-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                window.camStream = stream;
            } catch (e) {}
        }

        function stopCamera() {
            if (window.camStream) {
                window.camStream.getTracks().forEach(t => t.stop());
            }
        }

        function toggleChaos(toggle) {
            if (toggle.checked) {
                mainGrid.classList.add('chaos-active');
                chaosInterval = setInterval(() => {
                    document.body.style.filter = Math.random() > 0.5 ? 'invert(1)' : 'invert(0)';
                }, 2000);
            } else {
                mainGrid.classList.remove('chaos-active');
                clearInterval(chaosInterval);
                document.body.style.filter = 'invert(0)';
            }
        }

        function goToPage(num) { document.getElementById('settings-nav').style.transform = `translateX(-${num * 25}%)`; }

        function handleDevClick() {
            clickCount++;
            if (clickCount >= 6 && !devActive) {
                devActive = true;
                document.getElementById('dev-opt-item').style.display = 'flex';
                document.getElementById('toast').style.opacity = '1';
                setTimeout(() => document.getElementById('toast').style.opacity = '0', 2000);
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
