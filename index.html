        .bezel-fix {

            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);

        .lock-date { font-size: 0.9rem; font-weight: 400; opacity: 0.8; margin-top: -5px; }

        .unlocked-anim { transform: translateY(-100%) !important; opacity: 0 !important; pointer-events: none; }

        #homescreen { z-index: 40; padding: 50px 20px; box-sizing: border-box; }
        
        .app-grid > div, .dock {

            opacity: 0;
            transition: transform 0.8s var(--hyper-bezier), opacity 0.6s ease, filter 0.4s ease;
        }

        .unlocked-ready .app-grid > div, 
        .unlocked-ready .dock {
            transform: translateY(0) scale(1) rotateX(0deg);
            opacity: 1;
        }

        .app-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            transition: filter 0.4s ease, opacity 0.4s ease;
        }

        .dock {
            position: absolute; bottom: 15px; left: 10px; right: 10px;
            height: 65px; background: rgba(255,255,255,0.12);
            backdrop-filter: blur(25px); border-radius: 24px;
            display: flex; justify-content: space-evenly; align-items: center;
            transition: transform 0.8s var(--hyper-bezier), opacity 0.6s ease, filter 0.4s ease;
        }

        .app-icon {
            width: 52px; height: 52px; background: var(--glass);
            border-radius: var(--icon-radius);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, filter 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-sizing: border-box;
        }

        .app-icon.msg-special { background: #fff; }
        .app-icon.msg-special img { width: 55%; height: 55%; }
        .app-icon img { width: 100%; height: 100%; object-fit: contain; }
        .app-icon:active { transform: scale(0.85); }

        #app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60; transform: scale(0); opacity: 0;
            border-radius: var(--inner-radius);
            pointer-events: none; 
            background: #fff;
            overflow: hidden;
        }

        .settings-container { 
            width: 100%; height: 100%; position: absolute; inset: 0; 
            opacity: 0; pointer-events: none;
        }
        .settings-container.active { 
            opacity: 1; pointer-events: auto; 
        }
        .nav-handle-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            z-index: 5000; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 8px;
            pointer-events: auto !important; 
        }
        .nav-bar { width: 90px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 10px; }
        .dark-bar { background: rgba(0,0,0,0.25); }

<body>

    <div id="phone-wrapper">
        <div class="power-btn" id="pwr-btn"></div>
        <div id="phone-container">
            <div class="bezel-fix"></div>
            
            <div id="display-content">
                <div class="punch-hole"></div>
                <div class="status-bar"><span></span><span>📶 🔋</span></div>
                
                <div id="lockscreen" class="layer">
                    <h1 class="lock-clock" id="clock">09:41</h1>
                    <span class="lock-date" id="date">Monday, April 20</span>
                </div>

                <div id="homescreen" class="layer">
                    <div class="wallpaper-container" style="position: absolute; top:0; left:0; z-index:-1;">
                        <div id="homescreen-wall"></div>
                    </div>/miuidownload/icons/com.android.camera.webp"></div>
                    </div>
                </div>

                <div id="app-window">
                    <div id="settings-ui" class="settings-container">
                        <div id="main-settings" class="settings-view fade-in">
                            <h2 style="margin-top:0; color: #000;">Settings</h2>
                            <div class="settings-item" id="about-phone-trigger">
                                <span>About Phone</span>
                                <span>></span>
                    "text-align:center; margin-bottom:20px; margin-top:40px;">
                            <div class="spec-line"><span class
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('clock').innerText = `${hours}:${minutes}`;
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        const lockscreen = document.getElementById('lockscreen');
        const homescreen = document.getElementById('homescreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        const pwrBtn = document.getElementById('pwr-btn');
        const phone = document.getElementById('phone-container');
        const display = document.getElementById('display-content');
        const settingsUI = document.getElementById('settings-ui');
        const galleryUI = document.getElementById('gallery-ui');

        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;
        let activeAnim = null;

        document.getElementById('about-phone-trigger').addEventListener('click', () => {
            document.getElementById('main-settings').classList.replace('fade-in', 'fade-out');
            document.getElementById('about-phone-page').classList.replace('fade-out', 'fade-in');
        });

        document.getElementById('back-to-settings').addEventListener('click', () => {
            document.getElementById('about-phone-page').classList.replace('fade-in', 'fade-out');
            document.getElementById('main-settings').classList.replace('fade-out', 'fade-in');
        });

        document.querySelectorAll('.app-icon').forEach(icon => {
            icon.addEventListener('pointerdown', (e) => {
                if (!isPowerOn || !lockscreen.classList.contains('unlocked-anim')) return;
                
                const appName = icon.getAttribute('data-name');
                
                // KILL current animation if user spams
                if (activeAnim) activeAnim.cancel();

                // Toggle content
                [settingsUI, galleryUI].forEach(ui => ui.classList.remove('active'));
                if (appName === "Settings") settingsUI.classList.add('active');
                if (appName === "Gallery") galleryUI.classList.add('active');

                const rect = icon.getBoundingClientRect();
                const phoneRect = phone.getBoundingClientRect();
                const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
                const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
                
                appWindow.style.transformOrigin = `${x}% ${y}%`;
                appWindow.style.pointerEvents = 'auto';
                phone.classList.add('app-open-active');
                visualBar.classList.add('dark-bar');

                activeAnim = appWindow.animate([
                    { transform: 'scale(0)', opacity: 0, borderRadius: '34px' },
                    { transform: 'scale(1)', opacity: 1, borderRadius: '26px' }
                ], {
                    duration: 500,
                    easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                    fill: 'forwards'
                });
            });
        });

        trigger.addEventListener('pointerdown', (e) => { 
            if (isPowerOn) { isDragging = true; startY = e.clientY; } 
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            if (startY - e.clientY > 30) { 
                if (!lockscreen.classList.contains('unlocked-anim')) {
                    lockscreen.classList.add('unlocked-anim');
                    homescreen.classList.add('unlocked-ready');
                    visualBar.classList.add('dark-bar');
                } else {
                    if (activeAnim) activeAnim.cancel();
                    phone.classList.remove('app-open-active');
                    
                    activeAnim = appWindow.animate([
                        { transform: 'scale(1)', opacity: 1, borderRadius: '26px' },
                        { transform: 'scale(0)', opacity: 0, borderRadius: '34px' }
                    ], {
                        duration: 400,
                        easing: 'cubic-bezier(0.25, 1, 0.3, 1)',
                        fill: 'forwards'
                    });

                    activeAnim.onfinish = () => {
                        appWindow.style.pointerEvents = 'none';
                        document.getElementById('about-phone-page').classList.replace('fade-in', 'fade-out');
                        document.getElementById('main-settings').classList.replace('fade-out', 'fade-in');
                    };
                }
            }
            isDragging = false;
        });

        pwrBtn.addEventListener('click', () => {
            if (isPowerOn) {
                if (activeAnim) activeAnim.cancel();
                phone.classList.remove('app-open-active');
                lockscreen.classList.remove('unlocked-anim');
                homescreen.classList.remove('unlocked-ready');
                display.classList.add('screen-off');
                visualBar.classList.remove('dark-bar');
                appWindow.style.opacity = "0";
                appWindow.style.transform = "scale(0)";
                isPowerOn = false;
            } else {
                display.classList.remove('screen-off');
                isPowerOn = true;
            }
        });
    </script>
</body>
</html>
