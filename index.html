<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* HARDWARE FRAME */
        .phone {
            width: 320px;
            height: 660px;
            background: #111;
            border-radius: 40px;
            border: 8px solid #333; 
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s;
        }

        .phone.power-off { border-color: #000; }
        .phone.power-off .screen-content { opacity: 0; pointer-events: none; }

        /* S10 PUNCH HOLE */
        .punch-hole {
            position: absolute;
            top: 15px;
            right: 25px;
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            z-index: 1000;
        }

        .power-btn {
            position: absolute;
            right: -12px;
            top: 120px;
            width: 4px;
            height: 45px;
            background: #444;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 1001;
        }

        /* SCREEN CONTENT */
        .screen-content {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=2070') center/cover;
            z-index: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 80px 20px 20px;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #lockscreen.unlocked {
            transform: translateY(-100%);
            pointer-events: none;
        }

        /* HOME SCREEN & ICONS */
        .home-grid {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') center/cover;
            padding: 70px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            /* Liquid glass removed */
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* WINDOW ANIMATION */
        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            z-index: 400;
            border-radius: 32px;
            opacity: 0;
            pointer-events: none;
            transform-origin: 20% 15%; 
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.2s;
        }

        .app-window.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* NAVIGATION BARS */
        .home-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
        }

        /* Global trigger hidden on lockscreen to avoid "second line" */
        .app-home-trigger {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 700;
            visibility: hidden; 
        }

        .unlocked ~ .app-home-trigger {
            visibility: visible;
        }

        .status-bar {
            position: absolute;
            top: 15px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: white;
            z-index: 900;
        }
    </style>
</head>
<body>

    <div class="phone" id="device">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>

        <div class="screen-content">
            <div class="status-bar">
                <span id="clock">09:41</span>
                <span style="margin-right: 25px;">5G 🔋</span> 
            </div>

            <div id="lockscreen">
                <div style="text-align: center; color: white;">
                    <h1 style="font-size: 50px; font-weight: 200; margin:0;" id="lock-clock">09:41</h1>
                    <p style="opacity: 0.8; margin:0;">Thursday, Apr 16</p>
                </div>
                <div class="home-bar" id="swipe-bar" style="cursor: grab;"></div>
            </div>

            <div class="home-grid">
                <div class="app-icon" onclick="openApp('settings')">
                    <img src="image_bfdca3.jpg" alt="Settings">
                </div>
            </div>

            <div id="settings" class="app-window"></div>

            <div class="app-home-trigger" id="global-nav">
                <div class="home-bar" onclick="goHome()" style="background: rgba(255,255,255,0.4); cursor: pointer;"></div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = true;
        let startY = 0;

        const lockscreen = document.getElementById('lockscreen');
        const swipeBar = document.getElementById('swipe-bar');
        const globalNav = document.getElementById('global-nav');

        // SWIPE LOGIC
        const handleStart = (e) => {
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };

        const handleEnd = (e) => {
            const endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            if (startY - endY > 50) {
                lockscreen.classList.add('unlocked');
                globalNav.style.visibility = 'visible';
            }
        };

        swipeBar.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', (e) => { if(startY) handleEnd(e); startY = 0; });
        swipeBar.addEventListener('touchstart', handleStart);
        window.addEventListener('touchend', handleEnd);

        function togglePower() {
            const device = document.getElementById('device');
            if (isPowerOn) {
                device.classList.add('power-off');
                isPowerOn = false;
            } else {
                device.classList.remove('power-off');
                lockscreen.classList.remove('unlocked'); 
                globalNav.style.visibility = 'hidden';
                goHome(); 
                isPowerOn = true;
            }
        }

        function openApp(id) { document.getElementById(id).classList.add('open'); }
        function goHome() { document.querySelectorAll('.app-window').forEach(w => w.classList.remove('open')); }

        function updateTime() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
            document.getElementById('lock-clock').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
