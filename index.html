<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.0</title>
    <style>
        :root { --spd: 0.5s; --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); --bright: 1; }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #0a0a0a; font-family: -apple-system, sans-serif; overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        
        .phone { 
            width: 280px; height: 580px; background: #000; border: 12px solid #222; border-radius: 50px; 
            position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: #000; border-radius: 50%; z-index: 3900; border: 1px solid #1a1a1a; }
        
        .status-bar { 
            position: absolute; top: 0; width: 100%; height: 35px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; box-sizing: border-box; color: white; font-size: 11px; z-index: 3500; 
        }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); z-index: 2500; transform: translateY(-100%); transition: transform 0.4s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 80px; gap: 20px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 200px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 20px; color: white; text-align: center; }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: all 0.6s var(--ios-spring); z-index: 1; transform: scale(1.2); }
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 500; display: flex; flex-direction: column; align-items: center; padding-top: 70px; color: white; background: rgba(0,0,0,0.1); transition: transform 0.6s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 58px; font-weight: 200; }

        .drag-btn { position: absolute; width: 60px; height: 60px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); touch-action: none; }
        .icon-normal-settings { background: linear-gradient(180deg, #b0b0b5 0%, #5e5e62 100%); }
        .icon-normal-cc { background: linear-gradient(180deg, #5856d6 0%, #3634a3 100%); }
        .icon-normal-calc { background: linear-gradient(180deg, #ff9500 0%, #ffcc00 100%); }
        .icon-glassy { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        #settingsBtn { top: 110px; left: 30px; }
        #ccIconBtn { top: 110px; left: 110px; }
        #calcBtn { top: 110px; left: 190px; }

        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f2f2f7; z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 40px; overflow: hidden; }
        .app.glass-mode { background: rgba(255,255,255,0.4) !important; backdrop-filter: blur(30px); }

        .header { padding: 60px 20px 10px; font-weight: 800; font-size: 26px; color: #000; }
        .item { padding: 15px 18px; font-size: 16px; border-bottom: 0.5px solid #e5e5ea; cursor: pointer; color: #000; display: flex; justify-content: space-between; background: #fff; align-items: center; }
        .app.glass-mode .header, .app.glass-mode .item { color: #fff; }
        .app.glass-mode .item { background: rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Calc UI */
        .calc-res { height: 100px; display: flex; align-items: flex-end; justify-content: flex-end; padding: 20px; font-size: 42px; color: inherit; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .c-btn { height: 50px; background: #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #000; cursor: pointer; }
        .app.glass-mode .c-btn { background: rgba(255,255,255,0.2); color: #fff; }

        .home-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 100px; height: 5px; background: white; border-radius: 10px; z-index: 3500; cursor: pointer; }
        
        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .drag-btn { opacity: 1; transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; }
        .open .active-app { transform: scale(1); opacity: 1; pointer-events: auto; }
        .open .wallpaper { filter: blur(30px); transform: scale(1.1) !important; }
    </style>
</head>
<body>

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">
        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>
        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div onclick="toggleCC(true)" style="cursor:pointer">100% 🔋</div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <div style="font-size:12px; margin-bottom:10px;">Brightness</div>
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%;">
            </div>
            <div style="color:white; margin-top:20px; cursor:pointer;" onclick="toggleCC(false)">Close ✕</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div style="margin-top: 10px; opacity: 0.8;">Locked</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')">⚙️</div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onmousedown="setupDrag(event, this, 'cc')" ontouchstart="setupDrag(event, this, 'cc')">🎛️</div>
        <div class="drag-btn icon-normal-calc" id="calcBtn" onmousedown="setupDrag(event, this, 'calc')" ontouchstart="setupDrag(event, this, 'calc')">➗</div>

        <div class="app" id="settingsApp">
            <div id="p1" class="page">
                <div class="header">Settings</div>
                <div class="item" onclick="showPage(5)">Icons Style <span>›</span></div>
                <div class="item" onclick="showPage(2)">Animation Speed <span>›</span></div>
                <div class="item" onclick="showPage(4)">About <span>›</span></div>
            </div>
            <div id="p2" class="page" style="display:none;"><div class="header">Speed</div><div class="item" onclick="setSpd('0.5s')">Normal</div><div class="item" onclick="setSpd('0s')">Instant</div><div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div></div>
            <div id="p4" class="page" style="display:none;"><div class="header">About</div><div style="padding:40px; text-align:center;">FakeOS 1.0</div><div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div></div>
            <div id="p5" class="page" style="display:none;"><div class="header">Icons</div><div class="item" onclick="changeIconStyle('glassy')">Glassy</div><div class="item" onclick="changeIconStyle('normal')">Normal</div><div class="item" style="color:#007aff;" onclick="showPage(1)">Back</div></div>
        </div>

        <div class="app" id="calcApp">
            <div class="header">Calculator</div>
            <div class="calc-res" id="calcDisplay">0</div>
            <div class="calc-grid">
                <div class="c-btn" style="color:orange" onclick="calcOp('C')">C</div><div class="c-btn" onclick="calcOp('/')">÷</div><div class="c-btn" onclick="calcOp('*')">×</div><div class="c-btn" onclick="calcOp('-')">−</div>
                <div class="c-btn" onclick="calcOp('7')">7</div><div class="c-btn" onclick="calcOp('8')">8</div><div class="c-btn" onclick="calcOp('9')">9</div><div class="c-btn" onclick="calcOp('+')">+</div>
                <div class="c-btn" onclick="calcOp('4')">4</div><div class="c-btn" onclick="calcOp('5')">5</div><div class="c-btn" onclick="calcOp('6')">6</div><div class="c-btn" style="background:orange; color:white" onclick="calcOp('=')">=</div>
                <div class="c-btn" onclick="calcOp('1')">1</div><div class="c-btn" onclick="calcOp('2')">2</div><div class="c-btn" onclick="calcOp('3')">3</div><div class="c-btn" onclick="calcOp('0')">0</div>
            </div>
        </div>

        <div class="home-bar" onclick="handleHomeBar()"></div>
    </div>

    <script>
        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay'), wallpaper = document.getElementById('mainWallpaper');
        let isPowerOn = true, calcVal = "";

        function calcOp(v) {
            const d = document.getElementById('calcDisplay');
            if(v === 'C') calcVal = "";
            else if(v === '=') { try { calcVal = eval(calcVal).toString(); } catch { calcVal = "Error"; } }
            else calcVal += v;
            d.innerText = calcVal || "0";
        }

        function handleDoubleTap(e) {
            if (e.target.classList.contains('drag-btn')) return;
            if (!isPowerOn) { blackOverlay.classList.remove('screen-is-off'); isPowerOn = true; } 
            else if (!phone.classList.contains('open') && phone.classList.contains('is-unlocked')) { 
                blackOverlay.classList.add('screen-is-off'); phone.classList.remove('is-unlocked'); isPowerOn = false; 
            }
        }

        function handleHomeBar() { 
            if (isPowerOn && !phone.classList.contains('is-unlocked')) { phone.classList.add('is-unlocked'); } 
            else { 
                phone.classList.remove('open'); 
                document.querySelectorAll('.app').forEach(a => { a.classList.remove('active-app'); a.style.transform = "scale(0)"; });
                toggleCC(false); 
            } 
        }

        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            let moved = false;
            const isTouch = e.type === 'touchstart';
            const startX = isTouch ? e.touches[0].clientX : e.clientX;
            const startY = isTouch ? e.touches[0].clientY : e.clientY;
            const initX = el.offsetLeft;
            const initY = el.offsetTop;

            const move = (ev) => {
                const curX = isTouch ? ev.touches[0].clientX : ev.clientX;
                const curY = isTouch ? ev.touches[0].clientY : ev.clientY;
                // If moved more than 5px, it's a drag, not a click
                if (Math.abs(curX - startX) > 5 || Math.abs(curY - startY) > 5) moved = true;
                el.style.left = Math.max(10, Math.min(initX + (curX - startX), 210)) + 'px';
                el.style.top = Math.max(40, Math.min(initY + (curY - startY), 480)) + 'px';
            };

            const stop = () => { 
                document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', move); 
                document.removeEventListener(isTouch ? 'touchend' : 'mouseup', stop); 
                if (!moved) { 
                    if(type === 'cc') { toggleCC(true); }
                    else {
                        const app = document.getElementById(type + 'App');
                        app.style.transformOrigin = (parseInt(el.style.left)+30)+"px "+(parseInt(el.style.top)+30)+"px";
                        phone.classList.add('open');
                        app.classList.add('active-app');
                    }
                } 
            };
            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', move); 
            document.addEventListener(isTouch ? 'touchend' : 'mouseup', stop);
        }

        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
        function toggleCC(o) { if(isPowerOn && phone.classList.contains('is-unlocked')) document.getElementById('ccPanel').classList.toggle('cc-open', o); }
        function showPage(n) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById('p' + n).style.display = 'block'; }
        function setSpd(t) { document.documentElement.style.setProperty('--spd', t); }
        
        function changeIconStyle(s) { 
            document.querySelectorAll('.drag-btn').forEach(b => {
                if(s === 'glassy') b.className = 'drag-btn icon-glassy';
                else b.className = 'drag-btn ' + (b.id==='settingsBtn'?'icon-normal-settings':(b.id==='ccIconBtn'?'icon-normal-cc':'icon-normal-calc'));
            });
            document.querySelectorAll('.app').forEach(a => a.classList.toggle('glass-mode', s === 'glassy'));
        }

        function updateTime() { const now = new Date(); const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); document.getElementById('clock').innerText = t; document.getElementById('st-time').innerText = t; }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
